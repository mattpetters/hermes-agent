name: Sync Fork

on:
  workflow_dispatch: {}  # manual only — no schedule
  # Uncomment below to auto-run daily:
  # schedule:
  #   - cron: '0 6 * * *'  # 6am UTC daily

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          git fetch upstream main

      - name: Attempt merge
        id: merge
        run: |
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Already up to date with upstream."
            echo "status=up-to-date" >> $GITHUB_OUTPUT
            exit 0
          fi

          if git merge upstream/main --no-edit -m "ci: auto-sync with upstream/main"; then
            echo "Clean merge succeeded."
            echo "status=clean-merge" >> $GITHUB_OUTPUT
          else
            echo "Merge conflicts detected."
            echo "status=conflict" >> $GITHUB_OUTPUT
            git merge --abort
          fi

      - name: Push clean merge
        if: steps.merge.outputs.status == 'clean-merge'
        run: git push origin main

      - name: Create conflict issue
        if: steps.merge.outputs.status == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['sync-conflict'],
              state: 'open'
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '⚠️ Upstream sync conflict — manual resolution needed',
                body: [
                  'The daily sync with `NousResearch/hermes-agent:main` has merge conflicts.',
                  '',
                  '**Resolution steps:**',
                  '1. `git fetch upstream main`',
                  '2. `git merge upstream/main`',
                  '3. Resolve conflicts, commit, push',
                  '',
                  'This issue will auto-close on the next clean sync.',
                ].join('\n'),
                labels: ['sync-conflict']
              });
            }

      - name: Close conflict issue on clean sync
        if: steps.merge.outputs.status == 'clean-merge' || steps.merge.outputs.status == 'up-to-date'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['sync-conflict'],
              state: 'open'
            });
            for (const issue of issues) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
            }
